# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: returns-triage
services:
    ai-project:
        project: ""
        host: azure.ai.project
        language: ""
        deployments:
            - model:
                format: OpenAI
                name: gpt-5.4
                version: "2026-03-05"
              name: gpt-5.4
              sku:
                capacity: 30
                name: GlobalStandard
    returns-triage:
        project: ./src/agent
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        uses:
            - ai-project
        container:
            resources:
                cpu: "0.5"
                memory: 1Gi
        environmentVariables:
            - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
              value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
        kind: hosted
        name: returns-triage
        protocols:
            - protocol: responses
              version: 2.0.0
infra:
    provider: microsoft.foundry
