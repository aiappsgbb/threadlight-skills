# GitHub secret scanning configuration.
# https://docs.github.com/en/code-security/secret-scanning/using-advanced-secret-scanning-and-push-protection-features/excluding-folders-and-files-from-secret-scanning
#
# The paths below contain SYNTHETIC, non-functional credentials used purely as
# test fixtures and documentation examples. They are not real secrets:
#
#   * skills/**/tests/**  — positive-case fixtures for the threadlight-production-ready
#     supply-chain scanner (e.g. SUP-013 inline-credential detection). The tests must
#     embed fake `sk-...` / `ghp_...` strings to prove the detector fires.
#   * docs/superpowers/plans/**  — design docs that quote those same fixtures.
#   * skills/**/references/remediation-recipes/**  — "before/after" remediation examples
#     that show placeholder connection strings and env-var references.
#
# Excluding these paths prevents recurring false-positive secret-scanning alerts and
# push-protection blocks without weakening scanning of real source paths.
paths-ignore:
  - "skills/**/tests/**"
  - "docs/superpowers/plans/**"
  - "skills/**/references/remediation-recipes/**"
