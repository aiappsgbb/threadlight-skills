# .github/workflows/threadlight-e2e-foundry.yml
#
# Full E2E gate for the threadlight workshop scenario. Drives the 1-hour
# workshop runbook (docs/WORKSHOP-1H-QUICKSTART.md) via Copilot CLI in a
# clean GH Actions runner:
#   §4.2        threadlight-design (Fast-PoC, retail returns-triage)
#   §4.3        threadlight-local-test (Pattern 0 --info + --check) —
#               workflow-owned re-run as a cheap gate before spending
#               azd up money
#   §6.2+§6.3   threadlight-deploy → azd up (Foundry account + Container
#               App + hosted agent)
#   §6.4        Invoke 2 killer prompts against the deployed agent
#
# The Pattern 0 phase is a CI-only gate that is NOT in the workshop runbook's
# critical path (the workshop runs §4.4 Streamlit live for the same purpose).
# We use --info/--check instead because they're scriptable, deterministic,
# and exit non-zero on failure.
#
# WHY THIS EXISTS
# ===============
# Originally ported from aiappsgbb/agentic-loop/.github/workflows/
# lean-auto-e2e-foundry.yml with the enterprise-pilot scenario
# (auto-claim-triage / credit-memo / prior-auth-healthcare). Swapped to the
# workshop scenario in PR #N because (a) the workshop is the user-facing
# entry point for this skill pack, so it should be the thing we regression-
# test, and (b) the workshop's Pattern 0 gate catches design→deploy contract
# drift (sample-data schema, stub tool wiring, entity discovery) that the
# enterprise-pilot path skipped.
#
# COST + TRIGGER MODEL
# ====================
# - workflow_dispatch only — no cron, no PR trigger. Each run spends
#   ~$0.50-1 in Azure resources + ~$0.50 in model tokens. Fire deliberately.
# - Always-teardown via `azd down --force --purge` in `if: always()` step;
#   per-run RG name includes `github.run_id` to avoid collisions.
#
# FEATURE-BRANCH AUTH (when this workflow needs to run from a non-main ref)
# =========================================================================
# By default the shared UAMI's federated identity credentials cover only
# `refs/heads/main` (and possibly `pull_request`). Triggering this workflow
# from any other ref returns AADSTS700213 at the OIDC login step. To enable
# feature-branch runs, pick ONE pattern below — all are additive to the
# shared UAMI and preserve the existing main/PR FICs:
#
#   Pattern 1 — Environment-scoped FIC (RECOMMENDED, generalises to any branch)
#     One FIC + required-reviewer gate via GitHub Environments.
#     # Workflow change (job level):
#     #   environment: e2e-ci
#     # FIC subject:
#     #   repo:aiappsgbb/threadlight-skills:environment:e2e-ci
#     # GitHub setup: create the Environment with yourself as required reviewer.
#     Caveat: adding `environment:` to this job WILL change main's OIDC
#     subject too, so the existing main FIC must either be replaced or kept
#     alongside an additional `environment:e2e-ci` FIC.
#
#   Pattern 2 — pull_request FIC + add the trigger
#     # Workflow change (top-level on:):
#     #   pull_request:
#     #     types: [labeled, synchronize, reopened]
#     #     branches: [main]
#     # Job-level gate (avoid drive-by spending):
#     #   if: github.event_name == 'workflow_dispatch' ||
#     #       contains(github.event.pull_request.labels.*.name, 'e2e-ready')
#     # FIC subject:
#     #   repo:aiappsgbb/threadlight-skills:pull_request
#     Caveat: `workflow_dispatch` from a PR's head still presents the branch
#     subject (NOT pull_request), so this only helps the `pull_request` event.
#
#   Pattern 3 — Per-branch FIC (one-shot, ad hoc)
#     # FIC subject:
#     #   repo:aiappsgbb/threadlight-skills:ref:refs/heads/<branch-name>
#     Cheap to add + delete around a single run; doesn't scale beyond a few
#     branches because Entra FIC subjects are exact-match (no wildcards in
#     the classic API).
#
# az command shape (works for all three patterns — just swap --subject):
#   az identity federated-credential create \
#     --identity-name <UAMI_NAME> --resource-group <UAMI_RG> \
#     --name <fic-name> \
#     --issuer https://token.actions.githubusercontent.com \
#     --subject '<one of the subjects above>' \
#     --audience api://AzureADTokenExchange
#
# BYOK ENV-VARS
# =============
# Routes ONLY through Foundry via `COPILOT_PROVIDER_*` (no GitHub Copilot
# subscription used; no COPILOT_CLI_TOKEN). Env-var names verified against
# released Copilot CLI 1.0.57-2 (cask 1.0.48). See
# aiappsgbb/awesome-gbb/.github/workflows/copilot-cli-foundry-auth-smoke.yml
# for the canonical auth smoke that proved this routing works.
#
# REQUIRED GH SECRETS (configure on aiappsgbb/threadlight-skills)
# ================================================================
# - AZURE_CLIENT_ID         — UAMI client ID with Cog Svcs OpenAI User on the
#                             Foundry account + Contributor + User Access
#                             Administrator at subscription scope
# - AZURE_TENANT_ID         — Entra tenant for the CI subscription
# - AZURE_SUBSCRIPTION_ID   — subscription containing the Foundry account
# - AZURE_AI_ENDPOINT       — Foundry account base URL
#                             (https://<account>.cognitiveservices.azure.com).
#                             Re-used as AZURE_OPENAI_ENDPOINT for Pattern 0
#                             .env.local; --check does NOT instantiate the
#                             AOAI client so this re-use is safe in CI. If
#                             §4.4 Streamlit ever gets wired in CI, a
#                             separate AZURE_OPENAI_ENDPOINT (openai.azure.com
#                             form) secret will be required.
#
# See docs/ci/threadlight-e2e-setup.md for the one-time setup runbook.

name: threadlight e2e — workshop returns-triage

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Azure region for Foundry + ACA (workshop §6.2 AZURE_LOCATION)"
        required: false
        default: "westus3"
      model_deployment:
        description: "Foundry model deployment name. Used for both the agent driver (COPILOT_PROVIDER_MODEL_ID) AND the Pattern 0 .env.local (AZURE_OPENAI_DEPLOYMENT). Must match an existing deployment on the AZURE_AI_ENDPOINT account."
        required: false
        default: "gpt-5.4-mini"
      teardown:
        description: "Run azd down at the end? Set false to keep resources for post-run debugging."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      mode:
        description: "full = smoke + design + local-test + deploy + invoke + teardown (~$1/run); smoke-only = registry discovery gate only (~$0/run, ~30s, no Foundry/Azure resource cost)"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - smoke-only

permissions:
  id-token: write
  contents: read

env:
  E2E_RG_NAME: rg-threadlight-e2e-${{ github.run_id }}
  E2E_WORKSPACE: /tmp/threadlight-e2e-${{ github.run_id }}
  E2E_TENANT_ALIAS: ci

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Budget: design 10min + deploy 15min + invoke 5min + teardown 15min + headroom
    timeout-minutes: 60
    # Environment-scoped OIDC — see "FEATURE-BRANCH AUTH" in the header comment.
    # The shared UAMI's federated credential is registered for subject
    # `repo:aiappsgbb/threadlight-skills:environment:e2e-ci`, so every run
    # (any branch, including main) presents the same OIDC subject and clears
    # exactly one FIC. Required-reviewer protection rules on this Environment
    # double as the cost gate for ~$1/run spend.
    environment: e2e-ci

    steps:
      - uses: actions/checkout@v6.0.3

      # ── Isolated az / azd config dirs ────────────────────────────────
      # Mirrors the per-run isolation convention the threadlight-deploy skill
      # uses internally ($HOME/.azure-ci-$RUNID, $HOME/.azd-ci-$RUNID). We
      # export them via $GITHUB_ENV so EVERY subsequent step — azure/login,
      # azd auth login, the deploy agent, and the post-deploy assert — reads
      # and writes the same isolated token cache + env state. Without this,
      # the agent provisions into its isolated AZD env and the assert step
      # reads an empty default ~/.azd cache and reports the deploy missing
      # (run 26999100945 hit this exact mismatch on an otherwise-green
      # deploy).
      - name: Setup isolated az/azd config dirs
        run: |
          set -euo pipefail
          AZ_DIR="$HOME/.azure-ci-${{ github.run_id }}"
          AZD_DIR="$HOME/.azd-ci-${{ github.run_id }}"
          mkdir -p "$AZ_DIR" "$AZD_DIR"
          echo "AZURE_CONFIG_DIR=$AZ_DIR" >> "$GITHUB_ENV"
          echo "AZD_CONFIG_DIR=$AZD_DIR" >> "$GITHUB_ENV"
          echo "✓ AZURE_CONFIG_DIR=$AZ_DIR"
          echo "✓ AZD_CONFIG_DIR=$AZD_DIR"

      # ── Azure / Foundry auth ──────────────────────────────────────────
      - name: Azure login via OIDC
        uses: azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Foundry bearer token
        run: |
          set -euo pipefail
          # `--resource` takes the v1 AAD audience (the SP appId URI). The
          # v2 scope form (`<resource>/.default`) is only valid with `--scope`
          # — passing it to `--resource` triggers AADSTS500011. `tr -d '\r\n'`
          # defends against trailing whitespace from `-o tsv` that would
          # otherwise surface as an opaque 401 from Foundry.
          TOKEN=$(az account get-access-token \
            --resource https://cognitiveservices.azure.com \
            --query accessToken -o tsv | tr -d '\r\n')
          echo "::add-mask::$TOKEN"
          echo "COPILOT_PROVIDER_BEARER_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: 'DEBUG: token claims + direct endpoint curl'
        env:
          COPILOT_PROVIDER_BEARER_TOKEN: ${{ env.COPILOT_PROVIDER_BEARER_TOKEN }}
          ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          MODEL: ${{ inputs.model_deployment }}
        run: |
          set -uo pipefail
          echo "::group::Token claims (non-secret fields only)"
          python3 - <<'PY'
          import os, json, base64
          tok = os.environ.get("COPILOT_PROVIDER_BEARER_TOKEN","")
          if not tok or tok.count(".") < 2:
              print("NO TOKEN"); raise SystemExit(0)
          payload = tok.split(".")[1]
          payload += "=" * (-len(payload) % 4)
          claims = json.loads(base64.urlsafe_b64decode(payload).decode("utf-8","replace"))
          for k in ("aud","iss","oid","appid","azp","tid","roles","scp","idtyp","ver","appidacr","amr"):
              if k in claims:
                  print(f"{k}: {claims[k]}")
          PY
          echo "::endgroup::"
          echo "::group::Direct curl POST /openai/v1/responses"
          ENDPOINT_NORM="${ENDPOINT%/}"
          curl -sS -o /tmp/resp.json -w 'HTTP %{http_code}\n' \
            -H "Authorization: Bearer $COPILOT_PROVIDER_BEARER_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"${MODEL:-gpt-5.4-mini}\",\"input\":\"ping\"}" \
            "${ENDPOINT_NORM}/openai/v1/responses"
          head -c 1500 /tmp/resp.json
          echo
          echo "::endgroup::"
          echo "::group::Direct curl POST /openai/deployments/{m}/chat/completions"
          curl -sS -o /tmp/resp2.json -w 'HTTP %{http_code}\n' \
            -H "Authorization: Bearer $COPILOT_PROVIDER_BEARER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"messages":[{"role":"user","content":"ping"}],"max_completion_tokens":5}' \
            "${ENDPOINT_NORM}/openai/deployments/${MODEL:-gpt-5.4-mini}/chat/completions?api-version=2024-10-21"
          head -c 1500 /tmp/resp2.json
          echo
          echo "::endgroup::"
          # Non-fatal — diagnostic only
          true

      # ── Tool installs ────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install GitHub Copilot CLI
        run: |
          # Pin: Copilot CLI Skill-tool loader behaviour + COPILOT_PROVIDER_*
          # env contract are tied to a specific CLI release. Bump deliberately
          # and re-run the smoke step before merging the bump.
          npm install -g @github/copilot@1.0.59
          copilot --version

      - name: Install azd + Bicep + azd ai agent extension
        run: |
          set -euo pipefail
          curl -fsSL https://aka.ms/install-azd.sh | bash
          azd version
          az version
          az bicep install
          azd ext install azure.ai.agents || true
          azd ext list 2>&1 | grep -i "azure.ai.agents" || true

      # ── Python + Pattern 0 install ────────────────────────────────────
      # Workshop §4.3 needs python 3.13 (per §2 prereqs) and the
      # threadlight_quickstart package installed with the [aoai] extra
      # (pulls agent-framework[openai] for the AzureOpenAIChatClient path
      # the workshop documents). We pre-install here rather than letting
      # the agent do it inside §4.3, because:
      #   - faster (~1 min vs 5+ min of agent self-exec)
      #   - deterministic (no model variance in dep-resolution prompts)
      #   - lets the workflow-owned --info/--check assert step run cleanly
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install threadlight_quickstart [aoai]
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e \
            "${{ github.workspace }}/skills/threadlight-local-test/references/quickstart[aoai]"
          # Sanity: importable + correct entry point
          python -c "import threadlight_quickstart; print('threadlight_quickstart', threadlight_quickstart.__file__)"
          python -m threadlight_quickstart --help | head -20

      # ── azd auth via OIDC federated credential ────────────────────────
      # azd has its OWN auth chain — `azure/login@v3.0.0` only handles `az`.
      # Run #26769968309 caught this: agent reported
      # 'not logged in, run `azd auth login` to login to Azure'
      # at the deploy stage. Explicit azd auth login with the same
      # federated credential the rest of the job uses.
      - name: azd auth login (federated OIDC)
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          set -euo pipefail
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider github \
            --tenant-id "$AZURE_TENANT_ID"
          azd auth login --check-status

      # ── Tenant-isolation shim ─────────────────────────────────────────
      # threadlight-deploy's Phase 0 (and the agentic-loop SKILL it cribs)
      # reads ~/.azure-tenants/index.json to resolve a tenant alias.
      # CI has no such file; write a minimal one with a "ci" alias.
      # Means NO SKILL changes are required.
      - name: Write tenant index shim
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.azure-tenants" "$HOME/.azd-tenants"
          SUB_NAME=$(az account show --query name -o tsv)
          cat > "$HOME/.azure-tenants/index.json" <<EOF
          {
            "version": 1,
            "default_alias": "${{ env.E2E_TENANT_ALIAS }}",
            "tenants": {
              "${{ env.E2E_TENANT_ALIAS }}": {
                "tenant_id": "${{ secrets.AZURE_TENANT_ID }}",
                "description": "GH Actions CI alias for threadlight-e2e-foundry.yml",
                "config_dir": null,
                "azd_config_dir": null,
                "default_subscription": "${SUB_NAME}",
                "allowed_subscriptions": ["${SUB_NAME}"]
              }
            }
          }
          EOF
          echo "Tenant index written:"
          cat "$HOME/.azure-tenants/index.json"

      # ── Workspace prep ────────────────────────────────────────────────
      - name: Create fresh workspace
        run: |
          set -euo pipefail
          mkdir -p "${E2E_WORKSPACE}/.github/skills"
          # Symlink the threadlight skills from the checked-out repo so the
          # agent can read them via Skill tool. Also symlink agentic-loop
          # SKILLs if available (defaults this repo cribs from them).
          for s in threadlight-design threadlight-deploy threadlight-safe-check \
                   threadlight-local-test threadlight-event-triggers \
                   threadlight-hitl-patterns threadlight-demo-data-factory \
                   threadlight-workspace-ui threadlight-auto; do
            ln -snf "${{ github.workspace }}/skills/${s}" \
                    "${E2E_WORKSPACE}/.github/skills/${s}"
          done
          ls -la "${E2E_WORKSPACE}/.github/skills/"

      # ── Install the checked-out repo as a local Copilot plugin ───────
      # Even with .github/skills/ symlinks, the Copilot CLI's Skill tool
      # only finds skills that are formally registered as plugins.
      # (Run #26766613882 caught this: workflow symlinks created threadlight-auto
      # but `skill(threadlight-auto)` returned "Skill not found".)
      # Install the local checkout as a plugin so all skills — incl. brand-new
      # ones like threadlight-auto not yet on the marketplace — resolve.
      # DEPRECATED INSTALL FORM — migrate before this stops working:
      # `copilot plugin install <local path>` emits "Direct plugin installs
      # (repos, URLs, local paths) are deprecated. Only plugin@marketplace
      # installs will be supported in a future release." (Run log line 344.)
      # Migration: publish threadlight-skills to aiappsgbb/awesome-gbb and
      # switch this to `copilot plugin install threadlight-skills@awesome-gbb`.
      - name: Install local repo as Copilot plugin
        run: |
          set -euo pipefail
          copilot plugin install "${{ github.workspace }}" 2>&1 | tee /tmp/plugin-install.log
          echo ""
          echo "===== Installed plugins ====="
          copilot plugin list 2>&1 | head -20

      # Fail-fast gate: asserts every directory under skills/ is registered
      # in the Copilot CLI's Skill-tool catalog. Catches the silent loader-
      # drop regression first observed in run #26772059599, where the agent
      # fell back to Read on SKILL.md when skill(<name>) returned
      # "Skill not found", masking the failure as "success".
      #
      # Protocol: `copilot --output-format json` emits JSONL on stdout
      # including `session.skills_loaded` events whose `data.skills` is
      # the registered catalog. The smoke script parses the last non-empty
      # event and diffs against `find skills/ -mindepth 1 -maxdepth 1`.
      # No model assertions, no per-skill ECHO prompts — ~30s, deterministic,
      # no output-formatting variance under Foundry routing.
      - name: Smoke-check Skill-tool discovery
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_MODEL: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          # COPILOT_PROVIDER_BEARER_TOKEN already exported to $GITHUB_ENV
          # at the "Get Foundry bearer token" step (line ~116).
        run: ./scripts/ci/skill-discovery-smoke.sh
        timeout-minutes: 5

      # ── Drive workshop scenario (4 phases) ────────────────────────────
      # Each phase runs an explicit Copilot CLI prompt mapped to the
      # workshop runbook (docs/WORKSHOP-1H-QUICKSTART.md). Workflow-owned
      # asserts gate progression between phases.
      #
      # The retry-on-429 wrapper from the previous mono-Drive step is
      # extracted to /tmp/run-copilot-phase.sh so it's not duplicated 4×.
      - name: Write copilot phase helper
        if: inputs.mode != 'smoke-only'
        run: |
          mkdir -p /tmp/copilot-logs
          cat > /tmp/run-copilot-phase.sh <<'BASH_EOF'
          #!/usr/bin/env bash
          # Usage: run-copilot-phase.sh <phase-name> <log-file>
          # Reads the prompt from stdin so multi-line content doesn't get
          # mangled by shell-quoting in the calling step.
          set -euo pipefail
          PHASE="$1"
          LOG="$2"
          PROMPT="$(cat)"

          echo "----- $PHASE prompt -----"
          echo "$PROMPT"
          echo "-------------------------"

          for attempt in 1 2 3; do
            echo "===== [$PHASE] Copilot CLI attempt $attempt of 3 ====="
            START_TS=$(date +%s)
            if copilot \
                 --allow-all-tools \
                 --allow-all-paths \
                 --log-dir /tmp/copilot-logs \
                 --log-level info \
                 --no-custom-instructions \
                 --prompt "$PROMPT" \
                 2>&1 | tee -a "$LOG"; then
              ELAPSED=$(($(date +%s) - START_TS))
              echo "===== [$PHASE] Attempt $attempt succeeded in ${ELAPSED}s ====="
              exit 0
            fi
            ELAPSED=$(($(date +%s) - START_TS))
            # If session ran > 12 min before failing, the agent did real work
            # and a retry would just spend more money. Stop here.
            if [ $ELAPSED -gt 720 ]; then
              echo "===== [$PHASE] Attempt $attempt failed after ${ELAPSED}s of real work; not retrying ====="
              exit 1
            fi
            if ! tail -200 "$LOG" | grep -qE "Too Many Requests|CAPIError|transient API error|429"; then
              echo "===== [$PHASE] Non-transient failure detected; not retrying ====="
              exit 1
            fi
            BACKOFF=$((60 * attempt))
            echo "===== [$PHASE] Attempt $attempt failed on transient error after ${ELAPSED}s; sleeping ${BACKOFF}s ====="
            sleep $BACKOFF
          done
          echo "===== [$PHASE] All 3 attempts exhausted ====="
          exit 1
          BASH_EOF
          chmod +x /tmp/run-copilot-phase.sh

      - name: "[Phase 1/4] Drive §4.2 — threadlight-design Fast-PoC"
        if: inputs.mode != 'smoke-only'
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_MODEL: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
        run: |
          set -euo pipefail
          /tmp/run-copilot-phase.sh design /tmp/phase-design.log <<'PROMPT_EOF'
          Use the threadlight-design skill in Fast-PoC mode to design a retail returns-triage process in ${{ env.E2E_WORKSPACE }}/returns-triage. This is workshop quickstart §4.2 running non-interactively in CI.

          Here are the answers to the Fast-PoC interview questions — do NOT ask follow-up questions; treat the below as the completed Fast-PoC interview:
            - customer: Contoso Retail
            - industry / vertical: retail
            - process: returns-triage
            - participants: customer-service agent (human), returns supervisor (human), the AI assistant
            - upstream systems: order-management system, returns-database, customer-profile service (use stub tools — sample data only)
            - entities: at minimum 'orders' and 'returns' (each with id, customer_id, status, plus a few representative fields); add a 'customers' entity if it helps; populate sample-data with at least 3 records per entity
            - actions / branches: at minimum approve_refund, deny_refund, escalate_to_supervisor; add request_more_info if useful
            - runtime: Pattern 0 local (threadlight_quickstart) for §4.3 plus Foundry hosted agent for §6.2-6.4

          Final state required:
            - ${{ env.E2E_WORKSPACE }}/returns-triage/specs/SPEC.md exists and mentions 'returns'
            - ${{ env.E2E_WORKSPACE }}/returns-triage/AGENTS.md exists
            - ${{ env.E2E_WORKSPACE }}/returns-triage/specs/sample-data/ contains at least one non-empty JSON file (>10 bytes)
            - ${{ env.E2E_WORKSPACE }}/returns-triage/tests/killer-prompts.md exists with at least 2 prompts

          Skip browser previews of any generated demo or sales-kit HTML — do not attempt to install Playwright. Do NOT run 'git init' or 'git commit' on the workspace — it's a /tmp throwaway. Do the work YOURSELF in this session — do NOT delegate to background sub-agents or general-purpose Task tools. If anything fails, stop and surface the exact error.
          PROMPT_EOF
        timeout-minutes: 20

      - name: "[Phase 1/4 assert] Design artifacts exist + are non-trivial"
        if: inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          PILOT_DIR="${E2E_WORKSPACE}/returns-triage"
          echo "Checking pilot dir: $PILOT_DIR"
          ls -la "$PILOT_DIR" || { echo "::error::Pilot dir missing"; exit 1; }

          for f in specs/SPEC.md AGENTS.md tests/killer-prompts.md; do
            if [ ! -s "$PILOT_DIR/$f" ]; then
              echo "::error::Missing or empty: $f"
              exit 1
            fi
          done

          # Sample-data must have at least one non-empty JSON
          SAMPLE_DIR="$PILOT_DIR/specs/sample-data"
          [ -d "$SAMPLE_DIR" ] || { echo "::error::No sample-data dir"; exit 1; }
          NONEMPTY=$(find "$SAMPLE_DIR" -name "*.json" -size +10c | wc -l)
          if [ "$NONEMPTY" -lt 1 ]; then
            echo "::error::No non-trivial sample-data JSON files"
            ls -la "$SAMPLE_DIR" || true
            exit 1
          fi

          # SPEC.md should mention 'returns' to confirm scenario alignment
          if ! grep -qi "returns" "$PILOT_DIR/specs/SPEC.md"; then
            echo "::warning::SPEC.md does not mention 'returns' — scenario drift?"
          fi

          echo "✅ Design phase artifacts look healthy"
          echo "----- SPEC.md preview -----"
          head -40 "$PILOT_DIR/specs/SPEC.md"

          # Fast-PoC mode: the new Step 1.5 in threadlight-design (v1.7.0+)
          # MUST surface a one-line callout in SPEC § 12 saying that
          # audience mode / customer context / brand / production posture
          # were not collected. This is the auditable trail of silent
          # defaults — required so downstream skills (and reviewers) can
          # see what wasn't asked. Scope the check to § 12 only (not the
          # whole SPEC) and require multiple semantic markers so a stray
          # "Fast-PoC" mention elsewhere can't false-positive.
          SECTION12="$(awk '/^##[[:space:]]+12\./{flag=1; next} /^##[[:space:]]+13\./{flag=0} flag' "$PILOT_DIR/specs/SPEC.md" | tr '\n' ' ')"
          if [ -z "$SECTION12" ]; then
            echo "::error::SPEC.md § 12 (Assumptions) section not found — threadlight-design (≥1.7.0) must emit § 12"
            exit 1
          fi
          MISSING=0
          echo "$SECTION12" | grep -qiE "fast.?poc"     || { echo "::error::SPEC § 12 callout missing 'Fast-PoC' marker"; MISSING=1; }
          echo "$SECTION12" | grep -qiE "not collected" || { echo "::error::SPEC § 12 callout missing 'not collected' phrase"; MISSING=1; }
          echo "$SECTION12" | grep -qiE "neutral.+defaults|demo defaults" || { echo "::error::SPEC § 12 callout missing 'neutral/demo defaults' phrase"; MISSING=1; }
          if [ "$MISSING" -ne 0 ]; then
            echo "----- § 12 region of SPEC.md -----"
            awk '/^##[[:space:]]+12\./,/^##[[:space:]]+13\./' "$PILOT_DIR/specs/SPEC.md" | head -40
            exit 1
          fi
          echo "✅ Fast-PoC silent-defaults callout present in § 12"

      - name: "[Phase 2/4] Drive §4.3 — Pattern 0 setup via agent"
        if: inputs.mode != 'smoke-only'
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_MODEL: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
        run: |
          set -euo pipefail
          /tmp/run-copilot-phase.sh local-test /tmp/phase-local-test.log <<'PROMPT_EOF'
          Use the threadlight-local-test skill to set up Pattern 0 quickstart for ${{ env.E2E_WORKSPACE }}/returns-triage. This is workshop quickstart §4.3 running non-interactively in CI.

          Use these settings (do NOT ask):
            - LLM_BACKEND=aoai
            - AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_AI_ENDPOINT }}
            - AZURE_OPENAI_DEPLOYMENT=${{ inputs.model_deployment }}

          The threadlight_quickstart Python package is ALREADY pip-installed system-wide in CI — do NOT pip install it again.

          Steps:
            1. Write .env.local into ${{ env.E2E_WORKSPACE }}/returns-triage with the three keys above (LLM_BACKEND, AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_DEPLOYMENT).
            2. Run: python -m threadlight_quickstart --info --root ${{ env.E2E_WORKSPACE }}/returns-triage
            3. Run: python -m threadlight_quickstart --check --root ${{ env.E2E_WORKSPACE }}/returns-triage
            4. Show me the full stdout of both commands.

          Do NOT launch streamlit. Do NOT 'git init'. Do the work YOURSELF — no background sub-agents. If --check exits non-zero, stop and surface the error verbatim.
          PROMPT_EOF
        timeout-minutes: 15

      - name: "[Phase 2/4 assert] Workflow-owned --info + --check"
        if: inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          PILOT_DIR="${E2E_WORKSPACE}/returns-triage"
          echo "----- .env.local check -----"
          if [ ! -s "$PILOT_DIR/.env.local" ]; then
            echo "::error::Missing or empty $PILOT_DIR/.env.local"
            exit 1
          fi
          # Should NOT contain literal placeholder strings
          if grep -qE "<your-aoai-resource>|<your-deployment-name>|<placeholder>" "$PILOT_DIR/.env.local"; then
            echo "::error::.env.local still has placeholder values"
            cat "$PILOT_DIR/.env.local"
            exit 1
          fi
          # Tight key/value checks
          grep -qx "LLM_BACKEND=aoai" "$PILOT_DIR/.env.local" || {
            echo "::error::.env.local missing 'LLM_BACKEND=aoai'"
            cat "$PILOT_DIR/.env.local"
            exit 1
          }
          grep -qE "^AZURE_OPENAI_ENDPOINT=https://.+$" "$PILOT_DIR/.env.local" || {
            echo "::error::.env.local missing well-formed AZURE_OPENAI_ENDPOINT"
            cat "$PILOT_DIR/.env.local"
            exit 1
          }
          grep -qE "^AZURE_OPENAI_DEPLOYMENT=.+$" "$PILOT_DIR/.env.local" || {
            echo "::error::.env.local missing AZURE_OPENAI_DEPLOYMENT"
            cat "$PILOT_DIR/.env.local"
            exit 1
          }

          echo "----- workflow-owned --info -----"
          python -m threadlight_quickstart --info --root "$PILOT_DIR" | tee /tmp/info.out

          echo "----- workflow-owned --check -----"
          python -m threadlight_quickstart --check --root "$PILOT_DIR" | tee /tmp/check.out
          # Required success markers from cli.py:
          grep -q "Stub tools wired" /tmp/check.out || {
            echo "::error::--check did not report 'Stub tools wired'"
            exit 1
          }
          grep -q "Update + reset round-trip works" /tmp/check.out || {
            echo "::error::--check did not report 'Update + reset round-trip works'"
            exit 1
          }
          grep -q "agent_framework importable" /tmp/check.out || {
            echo "::error::agent_framework not importable — pip install lost"
            exit 1
          }
          echo "✅ Pattern 0 gate passed — proceeding to deploy"

      - name: "[Phase 3/4 pre] Pre-seed deployment-posture.md for non-interactive Phase 1.5"
        if: inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          # CI runs non-interactively — threadlight-deploy Phase 1.5 (v1.5.0+)
          # would otherwise hang at Path 2 (interactive operator prompt) because
          # Fast-PoC design intentionally leaves SPEC § 11f unpopulated. We
          # pre-create the canonical posture file with `deployment_target:
          # demo-sandbox` and `source: provided`, which the skill recognises
          # as an authoritative Path 1 trigger when SPEC is silent. This is
          # the documented CI/non-interactive override pattern.
          SPECS_DIR="${E2E_WORKSPACE}/returns-triage/specs"
          mkdir -p "$SPECS_DIR"
          POSTURE="${SPECS_DIR}/deployment-posture.md"
          cat > "$POSTURE" <<EOF
          # specs/deployment-posture.md — canonical deploy-time decision record
          # Pre-seeded by the CI workflow before threadlight-deploy Phase 1.5
          # runs. The skill (v1.5.0+) treats an existing posture file with a
          # valid deployment_target as a Path 1 trigger and proceeds silently.
          deployment_target: demo-sandbox
          source: provided
          chosen_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
          operator: ci-e2e-foundry@github-actions
          overrides:
            networking: public               # status: supported-now
            replicas: single                 # status: supported-now
            retention: 90d                   # status: supported-now
            model_pinning: preview-ok        # status: supported-now
            defender: off                    # status: supported-now (Ignore tag)
            cost_guardrails: none            # status: supported-now
            backup_dr: none                  # status: supported-now
            continuous_eval: plan-a-defaults # status: supported-now
          deferred_decisions: []
          EOF
          echo "✅ Pre-seeded $POSTURE"
          head -20 "$POSTURE"

      - name: "[Phase 3/4] Drive §6.2+§6.3 — threadlight-deploy + azd up"
        if: inputs.mode != 'smoke-only'
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_MODEL: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          AZURE_TENANT_ALIAS: ${{ env.E2E_TENANT_ALIAS }}
          # azd reads these env-vars when scaffolding + provisioning. The
          # agent must run `azd env new` ITSELF (after threadlight-deploy
          # scaffolds azure.yaml) — `azd env new` requires azure.yaml in
          # the cwd, so we can't pre-create the env from the workflow.
          # The post-deploy Assert step verifies AZURE_RESOURCE_GROUP in the
          # env matches E2E_RG_NAME (would catch a misconfiguration).
          AZURE_ENV_NAME: ci-${{ github.run_id }}
          AZURE_LOCATION: ${{ inputs.region }}
          AZURE_RESOURCE_GROUP: ${{ env.E2E_RG_NAME }}
          AZUREAI_ACCOUNT_NAME: ai-ci-${{ github.run_id }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          /tmp/run-copilot-phase.sh deploy /tmp/phase-deploy.log <<'PROMPT_EOF'
          Workshop quickstart §6.2 + §6.3 — deploy the returns-triage pilot in ${{ env.E2E_WORKSPACE }}/returns-triage to Azure. This is CI running non-interactively; do NOT pause for confirmation prompts.

          Mirror the workshop §6.2 + §6.3 prompts exactly:

          §6.2: In ${{ env.E2E_WORKSPACE }}/returns-triage, install the azd ai agent extension (already installed system-wide in this runner — harmless to re-run). Then create a new azd environment named ci-${{ github.run_id }} and set these env values (read from the shell env vars I've exported for you):
            - azd env set AZURE_LOCATION "$AZURE_LOCATION"
            - azd env set AZURE_RESOURCE_GROUP "$AZURE_RESOURCE_GROUP"
            - azd env set AZUREAI_ACCOUNT_NAME "$AZUREAI_ACCOUNT_NAME"
            - azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
            - azd env set AZURE_TENANT_ID "$AZURE_TENANT_ID"
          (If `azd env new` reports the env already exists, that's fine — just `azd env select ci-${{ github.run_id }}` and continue with the `azd env set` calls.)

          §6.3: Use the threadlight-deploy skill to azd up the pilot to Azure — tenant alias is ${{ env.E2E_TENANT_ALIAS }}. Expect ~3 min of azure-tenant-isolation handshake (tenant index lookup, subscription assertion, AZURE_CONFIG_DIR setup) BEFORE provisioning starts — that's the safety gate, not a hang.

          Posture is `demo-sandbox` for this CI run (throwaway RG, public ingress, 90d retention, no Defender, no DR, single replica). The pre-Phase-3 workflow step has already pre-created `${{ env.E2E_WORKSPACE }}/returns-triage/specs/deployment-posture.md` with `deployment_target: demo-sandbox` and `source: provided`. threadlight-deploy Phase 1.5 MUST detect this existing posture file and take Path 1 silently — do NOT ask the operator any posture questions and do NOT overwrite the file with a fresh interactive prompt. If you find yourself about to ask "What kind of deployment is the target subscription expecting?", stop: the answer is already on disk.

          Do the work YOURSELF — no background sub-agents. Do NOT 'git init'. Skip docs/verify.md SHA tracking (no git context).

          Final state required:
            - ${{ env.E2E_WORKSPACE }}/returns-triage/azure.yaml, infra/, src/, .azure/ all exist
            - ${{ env.E2E_WORKSPACE }}/returns-triage/specs/deployment-posture.md exists with `deployment_target: demo-sandbox`
            - 'azd ai agent show' (or equivalent) returns the deployed agent in an active state
            - `azd env get-value AZURE_RESOURCE_GROUP` returns "$AZURE_RESOURCE_GROUP" (the workflow asserts this post-deploy)

          If anything fails that you cannot auto-recover from, stop and surface the exact error.
          PROMPT_EOF
        timeout-minutes: 30

      - name: "[Phase 3/4 assert] Deployment-posture file recorded by Phase 1.5"
        if: inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          POSTURE="${E2E_WORKSPACE}/returns-triage/specs/deployment-posture.md"
          if [ ! -s "$POSTURE" ]; then
            echo "::error::threadlight-deploy Phase 1.5 did not write specs/deployment-posture.md"
            ls -la "${E2E_WORKSPACE}/returns-triage/specs/" 2>&1 || true
            exit 1
          fi
          if ! grep -qE "deployment_target:[[:space:]]*demo-sandbox" "$POSTURE"; then
            echo "::error::deployment-posture.md missing or has wrong deployment_target (expected demo-sandbox)"
            cat "$POSTURE"
            exit 1
          fi
          echo "✅ Phase 1.5 recorded posture decision"
          echo "----- deployment-posture.md preview -----"
          head -40 "$POSTURE"

      - name: "[Phase 4/4] Drive §6.4 — invoke killer prompts"
        if: inputs.mode != 'smoke-only'
        env:
          COPILOT_PROVIDER_TYPE: azure
          COPILOT_PROVIDER_BASE_URL: ${{ secrets.AZURE_AI_ENDPOINT }}
          COPILOT_PROVIDER_MODEL_ID: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_MODEL: ${{ inputs.model_deployment }}
          COPILOT_PROVIDER_WIRE_API: responses
          COPILOT_ALLOW_ALL: "true"
          COPILOT_AUTO_UPDATE: "false"
          AZURE_TENANT_ALIAS: ${{ env.E2E_TENANT_ALIAS }}
        run: |
          set -euo pipefail
          /tmp/run-copilot-phase.sh invoke /tmp/phase-invoke.log <<'PROMPT_EOF'
          Workshop quickstart §6.4 — invoke at least 2 killer prompts from ${{ env.E2E_WORKSPACE }}/returns-triage/tests/killer-prompts.md against the deployed returns-triage agent. Use the same surface the workshop documents (Invocations protocol against the cloud agent), not local Pattern 0.

          For each prompt, capture the actual command and the agent's actual response to a transcript file BEFORE writing any summary doc:
            - First prompt's raw output: tee to /tmp/phase-invoke-transcript-1.txt
            - Second prompt's raw output: tee to /tmp/phase-invoke-transcript-2.txt
          Use 'tee' (or shell redirection equivalent) — these files must contain the live transcript of the actual invocation command + actual response, not a rewritten summary.

          Then save a summary to ${{ env.E2E_WORKSPACE }}/returns-triage/docs/invoke-results.md with for each prompt: (a) the prompt text, (b) the agent's final response, (c) the trace of tool calls fired (which list_/get_/update_ tools the agent invoked).

          Final state required:
            - /tmp/phase-invoke-transcript-1.txt exists and is non-empty
            - /tmp/phase-invoke-transcript-2.txt exists and is non-empty
            - ${{ env.E2E_WORKSPACE }}/returns-triage/docs/invoke-results.md exists with at least 2 sections

          Do NOT fabricate transcripts. Do NOT write "I was unable to invoke" or "would have invoked" — if invocation truly fails, stop and surface the exact error instead. Do NOT 'git init'. Do the work YOURSELF — no background sub-agents.
          PROMPT_EOF
        timeout-minutes: 15

      - name: "[Phase 4/4 assert] Invoke results + transcripts captured"
        if: inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          RESULTS="${E2E_WORKSPACE}/returns-triage/docs/invoke-results.md"
          if [ ! -s "$RESULTS" ]; then
            echo "::error::Missing or empty invoke-results.md"
            ls -la "${E2E_WORKSPACE}/returns-triage/docs/" 2>&1 || true
            exit 1
          fi
          SECTIONS=$(grep -cE "^(## |Prompt:|### )" "$RESULTS" || true)
          if [ "$SECTIONS" -lt 2 ]; then
            echo "::error::invoke-results.md has fewer than 2 prompt sections (got $SECTIONS)"
            cat "$RESULTS"
            exit 1
          fi

          # Anti-fabrication: require BOTH transcript files non-empty
          for n in 1 2; do
            T="/tmp/phase-invoke-transcript-${n}.txt"
            if [ ! -s "$T" ]; then
              echo "::error::Transcript $T missing or empty — agent likely fabricated results"
              exit 1
            fi
            # Reject canned 'I was unable / hypothetical / simulated' phrases
            if grep -qiE "I was unable to invoke|could not invoke|would have invoked|simulated response|hypothetical response|cannot actually invoke" "$T"; then
              echo "::error::Transcript $T contains fabrication phrases — refusing to mark deploy+invoke green"
              echo "----- transcript $T -----"
              cat "$T"
              exit 1
            fi
          done

          echo "✅ Phase 4 captured $SECTIONS section(s) + 2 non-fabricated transcripts"
          echo "----- invoke-results.md preview -----"
          head -80 "$RESULTS"

      # ── Post-run assertions ──────────────────────────────────────────
      # Workshop Phase 3 places the pilot at $E2E_WORKSPACE/returns-triage.
      # We pin to that path explicitly because run 26999100945 caught
      # threadlight-deploy occasionally creating a nested duplicate at
      # $E2E_WORKSPACE/returns-triage/returns-triage/azure.yaml that a naive
      # `find ... | head -1` would pick non-deterministically. Fall back to
      # find only if the expected path is absent (future scenario).
      - name: Assert agent deployed + responding
        if: success() && inputs.mode != 'smoke-only'
        timeout-minutes: 3
        run: |
          set -euo pipefail
          PILOT_DIR="$E2E_WORKSPACE/returns-triage"
          if [ ! -f "$PILOT_DIR/azure.yaml" ]; then
            echo "⚠️ Expected $PILOT_DIR/azure.yaml missing — falling back to find"
            PILOT_DIR=$(find "$E2E_WORKSPACE" -mindepth 2 -maxdepth 2 -name azure.yaml -printf '%h\n' 2>/dev/null | head -1)
            if [ -z "$PILOT_DIR" ]; then
              echo "❌ No azure.yaml found under $E2E_WORKSPACE — pilot did not produce an azd project"
              ls -la "$E2E_WORKSPACE" 2>&1 || true
              exit 1
            fi
          fi
          echo "Pilot dir: $PILOT_DIR"
          echo "AZURE_CONFIG_DIR=$AZURE_CONFIG_DIR"
          echo "AZD_CONFIG_DIR=$AZD_CONFIG_DIR"
          cd "$PILOT_DIR"
          # Confirm the deployed env matches the RG the workflow created,
          # otherwise teardown would leak resources to a different RG.
          ENV_RG=$(azd env get-value AZURE_RESOURCE_GROUP 2>/dev/null || echo "")
          if [ "$ENV_RG" != "$E2E_RG_NAME" ]; then
            echo "❌ azd env AZURE_RESOURCE_GROUP=$ENV_RG does not match workflow E2E_RG_NAME=$E2E_RG_NAME — teardown would miss resources"
            exit 1
          fi
          # Hard timeouts on every azd call because azd WILL block on interactive
          # auth prompts when its own token cache has expired (run #26766613882:
          # 'azd ai agent show' hung for 54 min waiting for input until the
          # 60-min workflow timeout killed the whole job).
          echo "----- azd env get-values -----"
          timeout 30 azd env get-values 2>/dev/null | grep -E "(AGENT|FOUNDRY)_" || true
          echo "----- azd ai agent show -----"
          AGENT_STATUS=$(timeout 60 azd ai agent show -o json --no-prompt 2>/dev/null | jq -r '.status' 2>/dev/null \
                       || timeout 60 azd ai agent show "$(basename "$PILOT_DIR")" -o json --no-prompt 2>/dev/null | jq -r '.status' 2>/dev/null \
                       || echo "no-agent")
          echo "Agent status: $AGENT_STATUS"
          [ "$AGENT_STATUS" = "active" ] || {
            echo "❌ Agent did not reach status=active"
            exit 1
          }
          echo "✅ Agent active"

      - name: Snapshot deployed resources
        if: always() && inputs.mode != 'smoke-only'
        run: |
          set +e
          echo "----- resources in ${E2E_RG_NAME} -----"
          az resource list \
            --resource-group "${E2E_RG_NAME}" \
            --query "[].{name:name, type:type, location:location}" \
            -o table > /tmp/resource-snapshot.txt 2>&1 || true
          cat /tmp/resource-snapshot.txt

      # ── Always-teardown ───────────────────────────────────────────────
      - name: Teardown — sentinel (refuse to delete outside per-run scope)
        if: always() && inputs.teardown == 'true' && inputs.mode != 'smoke-only'
        run: |
          set -euo pipefail
          # Belt-and-braces guard. Every teardown command in this workflow
          # targets ONLY resources whose name embeds github.run_id. This step
          # refuses to proceed if E2E_RG_NAME or the per-run Cog Svcs account
          # name ever drift out of that namespace.
          #
          # NEVER touched by this workflow's teardown:
          #   - The shared UAMI (referenced via AZURE_CLIENT_ID secret)
          #   - The shared Foundry account (referenced via AZURE_AI_ENDPOINT)
          #   - Any subscription-level role assignment we didn't create
          #   - Any RG not named rg-threadlight-e2e-<this-run-id>
          # Anything outside the per-run prefix is someone else's resource.
          RUNID="${{ github.run_id }}"
          EXPECTED_RG="rg-threadlight-e2e-${RUNID}"
          EXPECTED_ACC="ai-ci-${RUNID}"
          if [ "$E2E_RG_NAME" != "$EXPECTED_RG" ]; then
            echo "::error::Teardown sentinel: E2E_RG_NAME='$E2E_RG_NAME' does NOT match expected '$EXPECTED_RG' — aborting teardown to avoid touching shared infra"
            exit 1
          fi
          echo "🛡  Teardown scope (this workflow will only touch these):"
          echo "    - Resource group:        $EXPECTED_RG"
          echo "    - Cog Svcs account:      $EXPECTED_ACC (soft-delete sweep)"
          echo "    - Local config dirs:     $AZURE_CONFIG_DIR, $AZD_CONFIG_DIR"
          echo "🛡  Preserved (NEVER touched):"
          echo "    - Shared UAMI:           AZURE_CLIENT_ID=${AZURE_CLIENT_ID:0:8}…"
          echo "    - Shared Foundry acct:   from AZURE_AI_ENDPOINT secret"
          echo "    - Subscription / tenant: $AZURE_SUBSCRIPTION_ID / $AZURE_TENANT_ID"
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Teardown — azd down --force --purge
        if: always() && inputs.teardown == 'true' && inputs.mode != 'smoke-only'
        timeout-minutes: 20
        run: |
          set +e
          # Pin to the expected workshop pilot path; fall back to find only
          # if missing (same rationale as the Assert step above).
          PILOT_DIR="$E2E_WORKSPACE/returns-triage"
          if [ ! -d "$PILOT_DIR/.azure" ]; then
            PILOT_DIR=$(find "$E2E_WORKSPACE" -mindepth 2 -maxdepth 2 -name azure.yaml -printf '%h\n' 2>/dev/null | head -1)
          fi
          if [ -z "$PILOT_DIR" ] || [ ! -d "$PILOT_DIR/.azure" ]; then
            echo "No pilot dir with .azure found — azd never initialized; skipping azd down."
            az group delete --name "${E2E_RG_NAME}" --yes --no-wait 2>/dev/null || true
            exit 0
          fi
          echo "Tearing down pilot at: $PILOT_DIR"
          echo "AZURE_CONFIG_DIR=$AZURE_CONFIG_DIR"
          echo "AZD_CONFIG_DIR=$AZD_CONFIG_DIR"
          cd "$PILOT_DIR"
          azd down --force --purge --no-prompt 2>&1 | tee /tmp/azd-down.log
          DOWN_EXIT=$?
          if [ $DOWN_EXIT -ne 0 ]; then
            echo "⚠️ azd down exited $DOWN_EXIT — attempting raw RG delete as fallback"
            az group delete --name "${E2E_RG_NAME}" --yes --no-wait || true
          fi

      - name: Fallback teardown — async RG delete
        if: always() && inputs.teardown == 'true' && inputs.mode != 'smoke-only'
        run: |
          set +e
          EXISTS=$(az group exists --name "${E2E_RG_NAME}" -o tsv)
          if [ "$EXISTS" = "true" ]; then
            echo "RG still exists after azd down — kicking off async delete"
            az group delete --name "${E2E_RG_NAME}" --yes --no-wait || true
          else
            echo "✓ RG ${E2E_RG_NAME} already gone"
          fi

      - name: Teardown — purge soft-deleted Cog Svcs accounts (per-run only)
        if: always() && inputs.teardown == 'true' && inputs.mode != 'smoke-only'
        run: |
          set +e
          # azd down --purge usually clears the soft-delete reservation, but
          # not always — a soft-deleted Cog Svcs / Foundry account holds the
          # name for 48h, blocking name reuse on re-runs. Sweep ONLY names
          # that embed this run's github.run_id; never anything else.
          RUNID="${{ github.run_id }}"
          EXPECTED_ACC="ai-ci-${RUNID}"
          DELETED_JSON=$(az cognitiveservices account list-deleted --query "[?name=='$EXPECTED_ACC']" -o json 2>/dev/null)
          COUNT=$(echo "$DELETED_JSON" | jq 'length' 2>/dev/null || echo 0)
          if [ "$COUNT" = "0" ] || [ -z "$COUNT" ]; then
            echo "✓ No soft-deleted Cog Svcs account named '$EXPECTED_ACC' — nothing to purge"
            exit 0
          fi
          echo "$DELETED_JSON" | jq -r '.[] | "\(.name)|\(.location)|\(.resourceGroup // "")"' | while IFS='|' read NAME LOC RG; do
            # Triple-guard: refuse to purge any name that doesn't embed our run_id.
            if [[ "$NAME" != *"$RUNID"* ]]; then
              echo "::warning::Refusing to purge '$NAME' — does not embed run_id $RUNID"
              continue
            fi
            echo "Purging soft-deleted Cog Svcs account: $NAME (loc=$LOC, rg=$RG)"
            if [ -n "$RG" ]; then
              az cognitiveservices account purge --name "$NAME" --location "$LOC" --resource-group "$RG" 2>&1 || \
                echo "::warning::Purge of $NAME exited non-zero (account may already be fully removed)"
            else
              az cognitiveservices account purge --name "$NAME" --location "$LOC" --resource-group "$E2E_RG_NAME" 2>&1 || \
                echo "::warning::Purge of $NAME exited non-zero (account may already be fully removed)"
            fi
          done

      # ── Artifact upload ──────────────────────────────────────────────
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: threadlight-e2e-${{ github.run_id }}
          path: |
            ${{ env.E2E_WORKSPACE }}/returns-triage/specs/
            ${{ env.E2E_WORKSPACE }}/returns-triage/docs/
            ${{ env.E2E_WORKSPACE }}/returns-triage/.env.local
            ${{ env.E2E_WORKSPACE }}/returns-triage/tests/
            ${{ env.E2E_WORKSPACE }}/returns-triage/AGENTS.md
            /tmp/phase-design.log
            /tmp/phase-local-test.log
            /tmp/phase-deploy.log
            /tmp/phase-invoke.log
            /tmp/phase-invoke-transcript-1.txt
            /tmp/phase-invoke-transcript-2.txt
            /tmp/info.out
            /tmp/check.out
            /tmp/copilot-logs/
            /tmp/resource-snapshot.txt
            /tmp/azd-down.log
            smoke-outputs/
          if-no-files-found: warn
          retention-days: 7
