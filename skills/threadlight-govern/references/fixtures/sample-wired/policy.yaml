# AGT governance policy (FIXTURE — governed pilot)
# Real agent-governance-toolkit schema: lints clean, has test fixtures, CI-gated.
version: "1.0.0"                      # ruleset version (this policy), not the AGT package
name: contoso-pilot-governance
description: Default-deny action governance for the contoso pilot.
metadata:
  references:
    - owasp-asi-2026

deny_by_default: true

rules:
  - name: block-shell-exec
    priority: 100
    conditions:
      - field: tool.name
        operator: eq
        value: shell_exec
    action: block

  - name: deny-external-email
    priority: 90
    conditions:
      - field: tool.name
        operator: eq
        value: send_external_email
    action: deny

  - name: escalate-create-ticket
    priority: 80
    description: create_ticket pauses for human approval.
    conditions:
      - field: tool.name
        operator: eq
        value: create_ticket
    action: escalate

  - name: allow-search-catalog
    priority: 10
    conditions:
      - field: tool.name
        operator: eq
        value: search_catalog
    action: allow
