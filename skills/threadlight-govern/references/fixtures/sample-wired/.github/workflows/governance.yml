name: agent-governance
on: [push, pull_request]
jobs:
  govern:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install the Agent Governance Toolkit
        run: pip install "agent-governance-toolkit[core]"
      - name: Lint policy schema
        run: agt lint-policy policy.yaml
      # Advisory: agt 4.1.0's `agt test` replay path binds an agent_os
      # PolicyDocument model that requires singular `condition` and rejects the
      # `escalate` action, so it fails on valid HITL policies that `agt
      # lint-policy` (and the agent_os runtime) accept. Keep it as a
      # non-blocking signal until the toolkit reconciles the replay schema.
      - name: Replay policy fixtures (advisory)
        continue-on-error: true
        run: agt test policy.yaml fixtures/
      - name: Verify (OWASP ASI 2026) and attest
        run: agt verify --badge | tee docs/agt-verifier-report.md
