- id: REL-007
  pillar: reliability
  title: Run and commit a restore drill (refresh ≤ 90 days)
  description: |
    REL-007 requires a `docs/restore-drill-YYYY-MM-DD.md` artefact whose
    date is ≤ 90 days old. Run the drill against your RSV, capture the
    output, commit it.
  bash: |
    DRILL_DATE="$(date -u +%Y-%m-%d)"
    OUT="docs/restore-drill-${DRILL_DATE}.md"
    mkdir -p docs
    cat <<MARKDOWN > "$OUT"
    # Restore drill — ${DRILL_DATE}

    **Drill owner:** _your name_
    **Vault:** _RSV name + subscription_
    **Protected item:** _name + container_
    **Restore point selected:** _id_
    **Restore target:** _staging RG / temporary disk_
    **Result:** _success | failure_
    **Notes:** _RPO observed, RTO observed, anomalies_
    MARKDOWN

    echo "Drafted ${OUT} — fill in the placeholders and commit."

- id: MDL-001
  pillar: model-lifecycle
  title: Pin model deployments (no "latest")
  description: |
    Every Microsoft.CognitiveServices/accounts/deployments must set
    properties.model.version to a concrete version, not "latest" and not
    blank.
  bash: |
    RG="$(jq -r .resource_group specs/manifest.json)"
    SUB="$(jq -r .subscription_id specs/manifest.json)"
    # Inventory the offending deployments first:
    az cognitiveservices account list -g "$RG" --subscription "$SUB" \
      --query "[].name" -o tsv | while read ACC; do
        az cognitiveservices account deployment list \
          --name "$ACC" -g "$RG" --subscription "$SUB" \
          --query "[?properties.model.version==null || properties.model.version=='latest'].{name:name, kind:properties.model.format}" \
          -o table
      done
    echo "Re-deploy each listed deployment with a pinned version (e.g. '2024-08-06')."
