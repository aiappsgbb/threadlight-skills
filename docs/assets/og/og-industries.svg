<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#0e1d3a"/>
      <stop offset="100%" stop-color="#1c1244"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7a59"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <style>
      .display { font-family: 'Source Serif Pro', 'Source Serif 4', 'Georgia', serif; font-weight: 600; fill: #f4f4f8; }
      .em      { fill: #ffffff; font-style: italic; }
      .meta    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; fill: #c8c8d8; letter-spacing: 0.04em; }
      .brand   { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 26px; fill: #ffffff; letter-spacing: 0.06em; font-weight: 700; }
      .sector  { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 18px; fill: #e7e7f0; letter-spacing: 0.06em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(72, 88)">
    <circle cx="14" cy="14" r="14" fill="url(#accent)"/>
    <text x="46" y="22" class="brand">THREADLIGHT &middot; INDUSTRIES</text>
    <text x="46" y="58" class="meta">six sectors &middot; one pattern</text>
  </g>

  <g transform="translate(72, 240)">
    <text class="display" font-size="78" y="0">Same chain.</text>
    <text class="display em" font-size="78" y="92">Different SPEC.</text>
  </g>

  <g transform="translate(72, 460)" font-family="'JetBrains Mono','Menlo',monospace" font-size="18" fill="#e7e7f0" letter-spacing="0.06em">
    <rect x="0"   y="0" width="170" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="0"   y="0" width="170" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="85"  y="36" text-anchor="middle">FSI</text>

    <rect x="184" y="0" width="170" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="184" y="0" width="170" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="269" y="36" text-anchor="middle">HEALTH</text>

    <rect x="368" y="0" width="170" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="368" y="0" width="170" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="453" y="36" text-anchor="middle">MFG</text>

    <rect x="552" y="0" width="170" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="552" y="0" width="170" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="637" y="36" text-anchor="middle">RETAIL</text>

    <rect x="736" y="0" width="170" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="736" y="0" width="170" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="821" y="36" text-anchor="middle">TELCO</text>

    <rect x="920" y="0" width="136" height="56" rx="12" fill="url(#accent)" opacity="0.15"/>
    <rect x="920" y="0" width="136" height="56" rx="12" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="988" y="36" text-anchor="middle">PUBLIC</text>
  </g>
</svg>
