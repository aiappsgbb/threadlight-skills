<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a06"/>
      <stop offset="55%" stop-color="#1a140a"/>
      <stop offset="100%" stop-color="#201705"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0b13a"/>
      <stop offset="100%" stop-color="#a8ff60"/>
    </linearGradient>
    <style>
      .display { font-family: 'Source Serif Pro', 'Source Serif 4', 'Georgia', serif; font-weight: 600; fill: #f4f4f8; }
      .em      { fill: #ffffff; font-style: italic; }
      .meta    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; fill: #d6cfc8; letter-spacing: 0.04em; }
      .brand   { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 26px; fill: #ffffff; letter-spacing: 0.06em; font-weight: 700; }
      .post    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; fill: #f0eae7; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(72, 88)">
    <circle cx="14" cy="14" r="14" fill="url(#accent)"/>
    <text x="46" y="22" class="brand">THREADLIGHT &#183; SELF-IMPROVING</text>
    <text x="46" y="58" class="meta">learn from any CI run &#183; green or red &#183; no matched-pair baseline</text>
  </g>

  <g transform="translate(72, 236)">
    <text class="display" font-size="76" y="0">The pipeline that</text>
    <text class="display em" font-size="76" y="90">learns from every run.</text>
  </g>

  <g transform="translate(72, 444)">
    <rect x="0"   y="0"  width="272" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="0"   y="0"  width="272" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="136" y="28" class="post" text-anchor="middle">HARVEST ONE RUN</text>

    <rect x="296" y="0"  width="272" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="296" y="0"  width="272" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="432" y="28" class="post" text-anchor="middle">CLASSIFY &#183; TAXONOMY</text>

    <rect x="592" y="0"  width="248" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="592" y="0"  width="248" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="716" y="28" class="post" text-anchor="middle">RANKED FIXES</text>

    <rect x="864" y="0"  width="264" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="864" y="0"  width="264" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="996" y="28" class="post" text-anchor="middle">COMPOUNDS OVER RUNS</text>

    <text x="0" y="92" class="meta" style="font-size:18px;fill:#bfae8f;">100&#37; precision on failures &#183; every fix mapped to its evidence</text>
  </g>
</svg>
