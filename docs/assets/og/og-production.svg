<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0d18"/>
      <stop offset="55%" stop-color="#0e1530"/>
      <stop offset="100%" stop-color="#160a30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
    <style>
      .display { font-family: 'Source Serif Pro', 'Source Serif 4', 'Georgia', serif; font-weight: 600; fill: #f4f4f8; }
      .em      { fill: #ffffff; font-style: italic; }
      .meta    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; fill: #c8c8d8; letter-spacing: 0.04em; }
      .brand   { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 26px; fill: #ffffff; letter-spacing: 0.06em; font-weight: 700; }
      .post    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; fill: #e7e7f0; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(72, 88)">
    <circle cx="14" cy="14" r="14" fill="url(#accent)"/>
    <text x="46" y="22" class="brand">THREADLIGHT &middot; PRODUCTION-READY</text>
    <text x="46" y="58" class="meta">three postures &middot; thirteen pillars &middot; one scorecard</text>
  </g>

  <g transform="translate(72, 240)">
    <text class="display" font-size="78" y="0">Green safe-check</text>
    <text class="display em" font-size="78" y="92">isn&apos;t go-live.</text>
  </g>

  <g transform="translate(72, 440)">
    <rect x="0"   y="0" width="320" height="100" rx="14" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.65"/>
    <rect x="40"  y="28" width="240" height="44" rx="8" fill="url(#accent)" opacity="0.25"/>
    <rect x="40"  y="28" width="240" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="160" y="56" class="post" text-anchor="middle">CITADEL SPOKE</text>

    <rect x="368" y="28" width="240" height="44" rx="8" fill="url(#accent)" opacity="0.25"/>
    <rect x="368" y="28" width="240" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="488" y="56" class="post" text-anchor="middle">AGT-ONLY</text>

    <line x1="688" y1="22" x2="936" y2="22" stroke="url(#accent)" stroke-width="2" stroke-dasharray="6 6"/>
    <rect x="696" y="46" width="240" height="44" rx="8" fill="url(#accent)" opacity="0.25"/>
    <rect x="696" y="46" width="240" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="816" y="74" class="post" text-anchor="middle">STANDARD GATEWAY</text>
  </g>
</svg>
