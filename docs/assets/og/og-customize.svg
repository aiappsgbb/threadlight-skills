<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070d12"/>
      <stop offset="55%" stop-color="#0a1a1e"/>
      <stop offset="100%" stop-color="#06201c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36c8a8"/>
      <stop offset="100%" stop-color="#a8ff60"/>
    </linearGradient>
    <style>
      .display { font-family: 'Source Serif Pro', 'Source Serif 4', 'Georgia', serif; font-weight: 600; fill: #f4f4f8; }
      .em      { fill: #ffffff; font-style: italic; }
      .meta    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; fill: #c8d6cf; letter-spacing: 0.04em; }
      .brand   { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 26px; fill: #ffffff; letter-spacing: 0.06em; font-weight: 700; }
      .post    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; fill: #e7f0ea; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(72, 88)">
    <circle cx="14" cy="14" r="14" fill="url(#accent)"/>
    <text x="46" y="22" class="brand">THREADLIGHT &middot; CUSTOMIZE</text>
    <text x="46" y="58" class="meta">the final leg &middot; fork &amp; onboard into the customer&apos;s own environment</text>
  </g>

  <g transform="translate(72, 236)">
    <text class="display" font-size="76" y="0">Make Threadlight</text>
    <text class="display em" font-size="76" y="90">the customer&apos;s own.</text>
  </g>

  <g transform="translate(72, 444)">
    <rect x="0"   y="0"  width="248" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="0"   y="0"  width="248" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="124" y="28" class="post" text-anchor="middle">01 &middot; INTAKE</text>

    <rect x="272" y="0"  width="248" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="272" y="0"  width="248" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="396" y="28" class="post" text-anchor="middle">02 &middot; FORK MAP</text>

    <rect x="544" y="0"  width="288" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="544" y="0"  width="288" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="688" y="28" class="post" text-anchor="middle">03 &middot; TEST IN-ENV</text>

    <rect x="856" y="0"  width="272" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="856" y="0"  width="272" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="992" y="28" class="post" text-anchor="middle">04 &middot; BOUNDARY</text>

    <text x="0" y="92" class="meta" style="font-size:18px;fill:#8fbfae;">instructions, not automation &middot; production onboarding first</text>
  </g>
</svg>
