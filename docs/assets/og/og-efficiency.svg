<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a06"/>
      <stop offset="55%" stop-color="#1a140a"/>
      <stop offset="100%" stop-color="#201705"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0b13a"/>
      <stop offset="100%" stop-color="#a8ff60"/>
    </linearGradient>
    <style>
      .display { font-family: 'Source Serif Pro', 'Source Serif 4', 'Georgia', serif; font-weight: 600; fill: #f4f4f8; }
      .em      { fill: #ffffff; font-style: italic; }
      .meta    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 22px; fill: #d6cfc8; letter-spacing: 0.04em; }
      .brand   { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 26px; fill: #ffffff; letter-spacing: 0.06em; font-weight: 700; }
      .post    { font-family: 'JetBrains Mono', 'Menlo', monospace; font-size: 16px; fill: #f0eae7; letter-spacing: 0.05em; }
    </style>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <g transform="translate(72, 88)">
    <circle cx="14" cy="14" r="14" fill="url(#accent)"/>
    <text x="46" y="22" class="brand">THREADLIGHT &#183; EFFICIENCY</text>
    <text x="46" y="58" class="meta">route each turn to the smallest model that can do it &#183; proven in CI</text>
  </g>

  <g transform="translate(72, 236)">
    <text class="display" font-size="76" y="0">Strong-model quality,</text>
    <text class="display em" font-size="76" y="90">at a cheap-model price.</text>
  </g>

  <g transform="translate(72, 444)">
    <rect x="0"   y="0"  width="248" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="0"   y="0"  width="248" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="124" y="28" class="post" text-anchor="middle">CHEAP BASELINE</text>

    <rect x="272" y="0"  width="248" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="272" y="0"  width="248" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="396" y="28" class="post" text-anchor="middle">MODEL-ROUTER</text>

    <rect x="544" y="0"  width="288" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="544" y="0"  width="288" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="688" y="28" class="post" text-anchor="middle">QUALITY CEILING</text>

    <rect x="856" y="0"  width="272" height="44" rx="8" fill="url(#accent)" opacity="0.22"/>
    <rect x="856" y="0"  width="272" height="44" rx="8" fill="none" stroke="url(#accent)" stroke-width="2"/>
    <text x="992" y="28" class="post" text-anchor="middle">SELF-IMPROVING</text>

    <text x="0" y="92" class="meta" style="font-size:18px;fill:#bfae8f;">quality AND real Azure dollars &#183; every run mined for the next fix</text>
  </g>
</svg>
